# Hyprwinwarp, For Custom Audio/Video Backgrounds
exec-once = hyprpm enable hyprwinwrap
# hycov
exec-once = hyprpm enable hycov
# hyev
exec-once = hyprpm enable hyev
# hych
# plugin = /usr/lib/libhych.so  

# Reloading Plugins
exec-once = hyprpm reload


plugin {
    hyprwinwrap {
        # class is an EXACT match and NOT a regex!
        class = kitty-bg
    },
    hycov {
        overview_gappo = 20 # gaps width from screen edge
        overview_gappi = 10 # gaps width from clients
        enable_hotarea = 0 # enable mouse cursor hotarea, when cursor enter hotarea, it will toggle overview    
        hotarea_monitor = all # monitor name which hotarea is in, default is all
        hotarea_pos = 3 # position of hotarea (1: bottom left, 2: bottom right, 3: top left, 4: top right)
        hotarea_size = 3 # hotarea size, 10x10
        swipe_fingers = 4 # finger number of gesture,move any directory
        move_focus_distance = 100 # distance for movefocus,only can use 3 finger to move 
        enable_gesture = 0 # enable gesture
        disable_workspace_change = 0 # disable workspace change when in overview mode
        disable_spawn = 1 # disable bind exec when in overview mode
        auto_exit = 1 # enable auto exit when no client in overview
        auto_fullscreen = 0 # auto make active window maximize after exit overview
        only_active_workspace = 0 # only overview the active workspace
        only_active_monitor = 0 # only overview the active monitor
        enable_alt_release_exit = 1 # alt swith mode arg,see readme for detail
        alt_replace_key = Alt_L # alt swith mode arg,see readme for detail
        alt_toggle_auto_next = 0 # auto focus next window when toggle overview in alt swith mode
        click_in_cursor = 1 # when click to jump,the target windwo is find by cursor, not the current foucus window.
        hight_of_titlebar = 0 # height deviation of title bar hight

    },
    hyev {
        open_window = play -v 1 /home/$USER/.config/hypr/sound/add.wav 
        close_window = play -v 1 /home/$USER/.config/hypr/sound/remove.wav  
        change_workspace = play -v 0.5 /home/$USER/.config/hypr/sound/change_workspace.wav 
        fullscreen_on = play -v 1 /home/$USER/.config/hypr/sound/fullscreen.wav 
        fullscreen_off = play -v 1 /home/$USER/.config/hypr/sound/tile.wav 
    }
}
# Hyprwinwrap
bind = SUPERSHIFTALT, B, exec, ~/.config/hypr/scripts/toggle-cava-bg
# Hyprcov


bind = Alt,tab,hycov:toggleoverview


bind = ALT,left,hycov:movefocus,l
bind = ALT,right,hycov:movefocus,r
bind = ALT,up,hycov:movefocus,u
bind = ALT,down,hycov:movefocus,d
#bind=ALT,i,hych:minimize # minimize window
#bind=ALT_SHIFT,i,hych:restore_minimize #manual restore window
#bind = ALT, w, hych:toggle_restore_window
# Updating Plugins
exec-once = hyprpm update
