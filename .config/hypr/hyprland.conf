# displays
source = ~/.config/hypr/displays.conf
#plugins
source = ~/.config/hypr/plugins.conf
# applications & services startup
source = ~/.config/hypr/startup.conf
# keybinds
source = ~/.config/hypr/keybinds.conf
# window rules & automatic window workspace placement
source = ~/.config/hypr/windowrules.conf

# blur for waybar, wezterm
# blurls = waybar
blurls = foot
blurls = wezterm
blurls = alacritty

input {
    kb_file =
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 0
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        scroll_factor = 0.6
    }
    sensitivity = 0
}

gestures {
    workspace_swipe=yes
    workspace_swipe_fingers=3
}

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgb(f4dbd6)
    col.inactive_border = rgba(24273a,0)
    apply_sens_to_raw = 0
}

decoration {
    rounding = 14
    drop_shadow = true
    shadow_range = 14
    shadow_render_power = 10
	blur {
	enabled=true
	new_optimizations=true
	size=3
	passes=1
}
}
# Animation
animations {
  enabled = true

# Berzier Curve
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1
  
# Animation
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = borderangle, 1, 30, liner, loop
  animation = fade, 1, 10, default
  animation = workspaces, 1, 5, wind
}

misc {
    vfr = 1
    vrr = 0
    focus_on_activate = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	#suppress_portal_warnings = true
	enable_swallow = true
}

dwindle {
    pseudotile = 0
}

# ____  _             _           
#|  _ \| |_   _  __ _(_)_ __  ___ 
#| |_) | | | | |/ _` | | '_ \/ __|
#|  __/| | |_| | (_| | | | | \__ \
#|_|   |_|\__,_|\__, |_|_| |_|___/
#               |___/             

plugin {
    hyprwinwrap {
        # class is an EXACT match and NOT a regex!
        class = kitty-bg
    },
    hycov {
        overview_gappo = 20 # gaps width from screen edge
        overview_gappi = 10 # gaps width from clients
        enable_hotarea = 1 # enable mouse cursor hotarea, when cursor enter hotarea, it will toggle overview    
        hotarea_monitor = all # monitor name which hotarea is in, default is all
        hotarea_pos = 1 # position of hotarea (1: bottom left, 2: bottom right, 3: top left, 4: top right)
        hotarea_size = 10 # hotarea size, 10x10
        swipe_fingers = 4 # finger number of gesture,move any directory
        move_focus_distance = 100 # distance for movefocus,only can use 3 finger to move 
        enable_gesture = 0 # enable gesture
        disable_workspace_change = 0 # disable workspace change when in overview mode
        disable_spawn = 1 # disable bind exec when in overview mode
        auto_exit = 1 # enable auto exit when no client in overview
        auto_fullscreen = 0 # auto make active window maximize after exit overview
        only_active_workspace = 0 # only overview the active workspace
        only_active_monitor = 0 # only overview the active monitor
        enable_alt_release_exit = 1 # alt swith mode arg,see readme for detail
        alt_replace_key = Alt_L # alt swith mode arg,see readme for detail
        alt_toggle_auto_next = 0 # auto focus next window when toggle overview in alt swith mode
        click_in_cursor = 1 # when click to jump,the target windwo is find by cursor, not the current foucus window.
        hight_of_titlebar = 0 # height deviation of title bar hight

    },
    hyev {
        open_window = play -v 0.4 /home/$USER/.config/hypr/sound/add.wav 
        close_window = play -v 0.4 /home/$USER/.config/hypr/sound/remove.wav  
        change_workspace = play -v 0.3 /home/$USER/.config/hypr/sound/change_workspace.wav 
        fullscreen_on = play -v 0.4 /home/$USER/.config/hypr/sound/fullscreen.wav 
        fullscreen_off = play -v 0.4 /home/$USER/.config/hypr/sound/tile.wav 
    }
}
