# displays
source = ~/.config/hypr/displays.conf
#plugins
source = ~/.config/hypr/plugins.conf
# applications & services startup
source = ~/.config/hypr/startup.conf
# keybinds
source = ~/.config/hypr/keybinds.conf
# window rules & automatic window workspace placement
source = ~/.config/hypr/windowrules.conf

# blur for waybar, wezterm
# blurls = waybar
blurls = foot
blurls = wezterm
blurls = alacritty

input {
    kb_file =
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 0
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        scroll_factor = 0.6
    }
    sensitivity = 0
}

gestures {
    workspace_swipe=yes
    workspace_swipe_fingers=3
}

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgb(f4dbd6)
    col.inactive_border = rgb(24273a)
    apply_sens_to_raw = 0
}

decoration {
    rounding = 14
    drop_shadow = false
    shadow_range = 14
    shadow_render_power = 10
	blur {
	enabled=true
	new_optimizations=true
	size=3
	passes=2
}
}
# Animation
#animations {
  #enabled = true

## Berzier Curve
  #bezier = wind, 0.05, 0.9, 0.1, 1.05
  #bezier = winIn, 0.1, 1.1, 0.1, 1.1
  #bezier = winOut, 0.3, -0.3, 0, 1
  #bezier = liner, 1, 1, 1, 1
  
## Animation
  #animation = windows, 1, 6, wind, slide
  #animation = windowsIn, 1, 6, winIn, slide
  #animation = windowsOut, 1, 5, winOut, slide
  #animation = windowsMove, 1, 5, wind, slide
  #animation = border, 1, 1, liner
  #animation = borderangle, 1, 30, liner, loop
  #animation = fade, 1, 10, default
  #animation = workspaces, 1, 5, wind
#}
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

misc {
    vfr = 0
    vrr = 0
    focus_on_activate = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	enable_swallow = true
	disable_hyprland_logo = true
	disable_splash_rendering = false
	suppress_portal_warnings
}

dwindle {
    pseudotile = 0
}

