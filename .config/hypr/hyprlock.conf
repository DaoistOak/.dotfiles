
widget_name {
    monitor =
    # further options
}
background {
    monitor =
    path = /tmp/hyprlock/screenshot.png
    # path = $HOME/Wallpaper/Catppuccin-Macchiato/Kurzgesagt-Black_Hole_1.png   # only png supported for now
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 4 # 0 disables blurring
    blur_size = 3

}
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    outer_color = rgb(244, 219, 214)
    inner_color = rgb(36, 39, 58) 
    font_color = rgb(244, 219, 214)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false

    position = 0, -20
    halign = center
    valign = center
}
label {
    monitor =
    text = Hi there, $USER
    color = rgb(202, 211, 245)
    font_size = 25
    font_family = JetBrains Mono 

    position = 0, 200
    halign = center
    valign = center
}
